    displayArea.classList.remove("has-media");

    document.querySelectorAll(".media-btn").forEach(b =>
      b.classList.toggle("active", parseInt(b.dataset.idx) === idx)
    );

    if (file.type === "image") {
      const img = document.createElement("img");
      img.className = "media";
      img.alt = file.name;
      img.style.opacity = "0";
      img.onload = () => {
        stopLoadingUI();
        img.style.opacity = "1";
        displayArea.classList.add("has-media");
        setStatus("ready", "ready", `${img.naturalWidth} x ${img.naturalHeight}px`);
        setDownload(file.path, file.name, "image");
      };
      img.onerror = () => { stopLoadingUI(); showError(file); };
      img.src = file.path;
      displayArea.appendChild(img);

    } else if (file.type === "video") {
      const vid = document.createElement("video");
      vid.controls = true; vid.preload = "metadata";
      vid.style.opacity = "0";
      vid.onloadedmetadata = () => {
        stopLoadingUI();
        vid.style.opacity = "1";
        displayArea.classList.add("has-media");
        setStatus("ready", "ready", `${vid.videoWidth}x${vid.videoHeight}  ${fmt(vid.duration)}`);
        setDownload(file.path, file.name, "video");
      };
      vid.onerror = () => { stopLoadingUI(); showError(file); };
      const src = document.createElement("source");
      src.src = file.path; src.type = "video/mp4";
      vid.appendChild(src);
      displayArea.appendChild(vid);
      vid.load();

    } else {
      stopLoadingUI(); showError(file);
    }
  }

  function showError(file) {
    displayArea.classList.remove("has-media");
    const old = displayArea.querySelector("img.media, video, .state-msg");
    if (old) old.remove();
    const w = document.createElement("div");
    w.className = "state-msg error-msg";
    w.innerHTML = `
      <img class="state-gif"
        src="furina2.png"
        alt="" onerror="this.style.display='none'" />
      <div class="state-title">couldn't load that one</div>
      <div class="state-sub">${esc(file.name)}<br>
        <span style="opacity:.5;font-size:9px">${esc(file.path)}</span></div>`;
    displayArea.appendChild(w);
    setStatus("error", "oops", "file failed to load");
    downloadBtn.classList.remove("visible");
    copyLinkBtn.classList.remove("visible");
  }

  function showEmpty() {
    const w = document.createElement("div");
    w.className = "state-msg";
    w.innerHTML = `
      <img class="state-gif"
        src="furina.png"
        alt="" onerror="this.style.display='none'" />
      <div class="state-title">pick something!</div>
      <div class="state-sub">click a file on the left</div>`;
    displayArea.appendChild(w);
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function fmt(s) {
    if (!isFinite(s)) return "";
    return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`;
  }

  document.querySelectorAll(".filter-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeFilter = tab.dataset.filter;
      renderList();
    });
  });

  searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value.trim().toLowerCase();
    renderList();
  });

  document.addEventListener("keydown", e => {
    if (e.target === searchInput) return;
    const vis = filteredList();
    if (!vis.length) return;
    const pos = vis.findIndex(f => mediaFiles.indexOf(f) === activeIndex);
    if (e.key === "ArrowDown") {
      e.preventDefault();
      loadMedia(mediaFiles.indexOf(vis[(pos + 1) % vis.length]));
      setTimeout(() => mediaList.querySelector(".media-btn.active")?.scrollIntoView({block:"nearest",behavior:"smooth"}), 30);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      loadMedia(mediaFiles.indexOf(vis[(pos - 1 + vis.length) % vis.length]));
      setTimeout(() => mediaList.querySelector(".media-btn.active")?.scrollIntoView({block:"nearest",behavior:"smooth"}), 30);
    }
  });

  const handle  = document.getElementById("resize-handle");
  const sidebar = document.getElementById("sidebar");
  let dragging  = false;
  handle.addEventListener("mousedown", e => { dragging = true; document.body.style.cursor = "col-resize"; e.preventDefault(); });
  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const w = Math.max(160, Math.min(420, e.clientX));
    sidebar.style.width = sidebar.style.minWidth = w + "px";
  });
  document.addEventListener("mouseup", () => { dragging = false; document.body.style.cursor = ""; });

  renderList();

  // check if a ?file= param was passed in the URL and auto-select it
  const urlParams = new URLSearchParams(window.location.search);
  const fileParam = urlParams.get("file");
  if (fileParam) {
    const idx = mediaFiles.findIndex(f => f.path === fileParam);
    if (idx !== -1) {
      loadMedia(idx);
      setTimeout(() => mediaList.querySelector(".media-btn.active")?.scrollIntoView({block:"nearest"}), 100);
    } else {
      loadMedia(0);
    }
  } else if (mediaFiles.length > 0) {
    loadMedia(0);
  } else {
    showEmpty();
    setStatus("", "no files defined");
  }
</script>
</body>
</html>

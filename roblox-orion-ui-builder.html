<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Orion UI Builder</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Roblox Orion UI Builder</h1>
    </header>
    <main>
        <section>
            <h2>Live Preview</h2>
            <div id="live-preview">
                <!-- Live component preview goes here -->
            </div>
        </section>
        <section>
            <h2>Hierarchy Tree</h2>
            <ul id="hierarchy-tree">
                <!-- Hierarchy tree structure will be populated here -->
            </ul>
        </section>
        <section>
            <h2>Properties Editor</h2>
            <div id="properties-editor">
                <!-- Properties editor for components -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 SairyTheKing. All rights reserved.</p>
    </footer>
</body>
</html>

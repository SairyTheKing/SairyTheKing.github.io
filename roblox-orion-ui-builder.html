<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Roblox UI Builder</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        #uiContainer { border: 1px solid #ccc; padding: 10px; }\n        .element { margin: 5px; padding: 5px; border: 1px dashed gray; }\n        .button { background-color: blue; color: white; padding: 10px; border: none; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <h1>Roblox Orion UI Builder</h1>\n    <div id=\"uiContainer\"></div>\n    <button class=\"button\" onclick=\"addButton()\">Add Button</button>\n    <script>\n        function addButton() {\n            const btn = document.createElement('div');\n            btn.className = 'element';\n            btn.innerHTML = 'New UI Button';\n            btn.onclick = function() { alert(\"Button clicked!\"); };\n            document.getElementById('uiContainer').appendChild(btn);\n        }\n    <\/script>\n</body>\n</html>
